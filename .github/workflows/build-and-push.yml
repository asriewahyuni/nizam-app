name: Build and Push .next

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Commit .next
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .next
          git commit -m "chore: update .next build output" || echo "No changes to commit"
          git push
